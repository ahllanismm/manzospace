        background:#ff5f96;
}

    .logo{
        font-size:24px;

/* taytelll */

.projects-title{
    text-align:center;
    margin-bottom:50px;
}

.projects-title p{
    color:#ff4fa0;
    font-weight:bold;
}

.projects-title h1{
    color:#666;
    margin-top:10px;
}

/* cards */

.projects-container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.project-card{
    width:300px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.project-card:hover{
    transform:translateY(-8px);
}

.project-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.project-info{
    padding:20px;
}

.project-info h3{
    color:#ff7eb8;
    margin-bottom:10px;
}

.project-info p{
    color:#666;
    line-height:1.5;
}


    @media(max-width:900px){

        .hero{
            flex-direction:column-reverse;
            text-align:center;
            padding-top:40px;
        }

        h1{
            font-size:42px;
        }

        .description{
            margin:auto;
            margin-bottom:30px;
        }

        .buttons{
            justify-content:center;
        }

        .circle{
            width:280px;
            height:280px;
        }

        .profile{
            width:260px;
        }
    }

    @media (max-width: 768px){

nav{

}

.logo{

}

.nav-links{
    background:#fff5fa;
    border-radius:25px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    width:90%;
    max-width:none;
    margin: 0 auto;

    padding:15px 10px;
}


.nav-links a{
    font-size:0.85rem;
    color:#333;
    margin-left:0;
}

.hero{
    flex-direction:column-reverse;
    text-align:center;
    padding-top:20px;
}

h1{
    font-size:1.3rem;
    font-weight: 50px;
}

.description{

}

.buttons{

.btn{

}

.nav-links{

}
