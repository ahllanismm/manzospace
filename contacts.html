<style>

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#fff7fb;
        color:#333;
    }



    nav{
        width:90%;
        margin:25px auto;
        background:#ffb6d9;
        padding:15px 40px;
        border-radius:50px;

        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .logo{
        font-size:24px;
        font-weight:700;
        color:white;
    }

    nav ul{
        display:flex;
        list-style:none;
        gap:30px;
    }


    nav a{
        text-decoration:none;
        color: #333;
        font-weight:100;
    }

    .nav-links a:hover{
            color:#ff4fa0;
        }

    .contact{
        min-height:80vh;

        display:flex;
        justify-content:center;
        align-items:center;

        padding:50px;
    }

    .contact-box{
        background:white;
        padding:50px;
        border-radius:30px;
        width:800px;
        text-align:center;

        box-shadow:0 10px 30px rgba(255,182,217,0.2);
    }

    .contact-box h1{
        font-size:50px;
        color:#ff69b4;
        margin-bottom:10px;
    }

    .contact-box p{
        color:#666;
        margin-bottom:30px;
    }



    .socials{
        display:flex;
        justify-content:center;
        gap:20px;
        flex-wrap:wrap;
        margin-bottom:40px;
    }

    .socials a{
        text-decoration:none;
        background:#ffd6ea;
        color:#ff4fa0;

        padding:12px 25px;
        border-radius:30px;
        font-weight:600;

        transition:0.3s;
    }

    .socials a:hover{
        background:#ff69b4;
        color:white;
    }



    .email-card{
        background:#fff0f7;
        padding:25px;
        border-radius:20px;
    }

    .email-card h3{
        color:#ff69b4;
        margin-bottom:10px;
    }

    .email-card p{
        margin:0;
        font-size:18px;
        font-weight:500;
    }

    @media(max-width:900px){

        .hero{
            flex-direction:column-reverse;
            text-align:center;
            padding-top:40px;
        }

        h1{
            font-size:42px;
        }

        .description{
            margin:auto;
            margin-bottom:30px;
        }

        .buttons{
            justify-content:center;
        }

        .circle{
            width:280px;
            height:280px;
        }

        .profile{
            width:260px;
        }
    }

    @media (max-width: 768px){

nav{
    width:95%;
    margin:15px auto;
    padding:15px 15px;
    border-radius:35px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.logo{
    font-size:1.5rem;
    color:#ff4f9d;
    text-align:center;
    margin-bottom:15px;
}


.nav-links a{
    font-size:0.85rem;
    color:#333;
    margin-left:0;

    text-decoration:none;
    font-weight:300;
}

.hero{
    flex-direction:column-reverse;
    text-align:center;
    padding-top:20px;
}

h1{
    font-size:2rem;
}

.description{
    font-size:0.95rem;
    max-width:100%;
}

.buttons{
    flex-direction:column;
    align-items:center;
}

.btn{
    width:220px;
}

.profile{
    width:230px;
    left:0;
    transform:none;
}

.circle{
    width:260px;
    height:260px;
}

.card1{
    top:20px;
    right:0;
    font-size:12px;
}

.card2{
    bottom:30px;
    left:0;
    font-size:12px;
}

.nav-links{
    background:#ffd9ea;
    border-radius:20px; 
    padding:12px 20px;
    
    display:flex;
    justify-content:center;
    align-items:center;

    width:85%;
    max-width:350px;
}

nav ul{
    padding: 0;
    margin:0 ;
    gap: 17px;
}
