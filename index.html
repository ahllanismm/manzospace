<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<window.location.href = "portfolio.html";>
    
<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="login-container">

    <div class="ribbon">
         My Creative Space 
    </div>

    <div class="login-card">

        <h1>Wanna go in?</h1>
        <p>Enter the passcode to access my space.</p>

        <input type="password" id="password" placeholder="Enter Passcode">

        <button id="enterBtn" onclick="checkPassword()">
            Enter Site
        </button>

        <p id="error"></p>

    </div>

</div>


<script>

function checkPassword(){

    let password =
    document.getElementById("password").value;

    if(password === "projsainteg"){

        window.location.href = "index.html";

    }else{

        document.getElementById("error").innerHTML =
        "Incorrect passcode.";

    }

}

</script>

<script>

const passcode = document.getElementById("password");
const enterBtn = document.getElementById("enterBtn");

passcode.addEventListener("input", function(){

    if(passcode.value.length >= 9){
        enterBtn.classList.add("active");
    }
    else{
        enterBtn.classList.remove("active");
    }

});

function checkPassword(){

    if(passcode.value.length < 8){
        alert("Entry must be at least 11 characters!");
        return;
    }

    if(passcode.value === "projsainteg"){
        window.location.href = "index.html";
    }
    else{
        alert("Wrong password! Try again hehe.");
    }

}

</script>

</body>
</html>
